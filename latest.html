  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; font-size: 14px; -webkit-font-smoothing: antialiased; transition: background 0.3s ease, color 0.3s ease; }
  .header { background: var(--header-bg); color: white; padding: 1.75rem 1.5rem 1.5rem; text-align: center; position: relative; }
  .header-content { position: relative; z-index: 1; max-width: 800px; margin: 0 auto; }
  .header .edition { font-size: 0.65rem; letter-spacing: 3px; text-transform: uppercase; color: rgba(255,255,255,0.5); margin-bottom: 0.4rem; }
  .header h1 { font-size: 1.75rem; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 0.25rem; }
  .header .date { font-size: 0.85rem; font-weight: 300; color: rgba(255,255,255,0.65); }
  .header .divider-line { width: 40px; height: 2px; background: var(--accent); margin: 0.75rem auto 0; border-radius: 2px; }
  .theme-toggle { position: absolute; top: 1rem; right: 1rem; z-index: 10; background: var(--toggle-bg); border: 1px solid rgba(255,255,255,0.12); color: white; width: 34px; height: 34px; border-radius: 50%; cursor: pointer; font-size: 0.95rem; display: flex; align-items: center; justify-content: center; transition: background 0.2s ease; backdrop-filter: blur(8px); }
  .theme-toggle:hover { background: var(--toggle-hover); }
  .filter-bar { position: sticky; top: 0; z-index: 50; background: var(--filter-bar-bg); border-bottom: 1px solid var(--border); padding: 0.6rem 1.25rem; display: flex; gap: 0.35rem; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
  .filter-bar::-webkit-scrollbar { display: none; }
  .filter-btn { flex-shrink: 0; padding: 0.3rem 0.7rem; border-radius: 20px; font-size: 0.68rem; font-weight: 600; letter-spacing: 0.3px; cursor: pointer; border: 1px solid var(--border); background: var(--filter-inactive-bg); color: var(--filter-inactive-text); transition: all 0.15s ease; white-space: nowrap; font-family: inherit; }
  .filter-btn:hover { border-color: var(--muted); }
  .filter-btn.active { color: var(--filter-active-text); border-color: transparent; }
  .container { max-width: 1100px; margin: 0 auto; padding: 1.25rem 1.25rem 3rem; }
  .summary-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.5rem; margin-bottom: 1.5rem; }
  .summary-chip { background: var(--chip-bg); border-radius: 8px; padding: 0.6rem 0.5rem; text-align: center; box-shadow: var(--shadow); border: 1px solid var(--border); }
  .summary-chip .num { font-size: 1.3rem; font-weight: 800; color: var(--accent2); line-height: 1.2; }
  .summary-chip .label { font-size: 0.6rem; letter-spacing: 0.8px; text-transform: uppercase; color: var(--muted); margin-top: 0.1rem; }
  .section { margin-bottom: 1.5rem; }
  .section.hidden { display: none; }
  .section-header { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.75rem; padding-bottom: 0.5rem; border-bottom: 2px solid var(--border); }
  .section-icon { width: 28px; height: 28px; border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 0.9rem; flex-shrink: 0; }
  .section-header h2 { font-size: 1.05rem; font-weight: 700; color: var(--section-title); letter-spacing: -0.2px; }
  .story-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.6rem; }
